<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contrasena - SENA Mapeo</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('/img/2148430814.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: url('/img/logo_sena.png') center/contain no-repeat;
            z-index: 1000;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 460px;
            position: relative;
        }
        .logo-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        .title {
            text-align: center;
            color: #000;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #355070;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #000;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .document-input-group {
            position: relative;
        }
        .document-input-group input {
            padding-right: 45px;
        }
        .document-status {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            background: #dcdcdc;
            color: #ffffff;
        }
        .password-input-group { position: relative; }
        .password-input-group input { padding-right: 45px; }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(102, 126, 234, 0.25);
            background: rgba(102, 126, 234, 0.08);
            cursor: pointer;
            color: #667eea;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .toggle-password:hover {
            background: rgba(102, 126, 234, 0.16);
            box-shadow: 0 6px 14px rgba(102, 126, 234, 0.18);
        }
        .toggle-password svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0c0d0d 0%, #097b98 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #eef3fb;
            color: #355070;
            border: 1px solid #c7d3e6;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary:disabled,
        .btn-primary:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .button-stack {
            display: grid;
            gap: 10px;
        }
        .countdown-box {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #eef6ff;
            border: 1px solid #cfe0f5;
            color: #355070;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        .countdown-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 8px;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
            vertical-align: middle;
        }
        .countdown-box strong {
            color: #0c5460;
        }
        .back-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .gespro-alert-popup {
            border-radius: 18px !important;
            padding: 24px !important;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18) !important;
        }
        .gespro-alert-title {
            font-size: 28px !important;
            font-weight: 700 !important;
            color: #355070 !important;
        }
        .gespro-alert-text {
            font-size: 17px !important;
            color: #4b5563 !important;
        }
        .gespro-alert-button {
            background: #355070 !important;
            border-radius: 10px !important;
            padding: 10px 22px !important;
            font-weight: 700 !important;
            box-shadow: none !important;
        }
        .error-message, .success-message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message { background-color: #f8d7da; color: #721c24; }
        .success-message { background-color: #d4edda; color: #155724; }
        .requirement-box {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 13px;
        }
        .requirement-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        .requirement-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border-radius: 50%;
            background: #ddd;
            color: white;
            text-align: center;
            line-height: 16px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/img/logo3.png" alt="Logo 3" class="logo-top-right">
        <h1 class="title">Recuperar contrasena</h1>
        <p class="subtitle">Primero solicita un codigo por correo y luego ingresa ese codigo para crear tu nueva clave.</p>

        <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
            <div class="form-group">
                <label for="recovery-correo">Correo electronico</label>
                <input type="email" id="recovery-correo" value="{{ prefill_correo }}" placeholder="correo@example.com" required>
            </div>

            <div class="form-group">
                <label for="recovery-documento">Numero de documento</label>
                <input type="text" id="recovery-documento" placeholder="Ingresa tu documento" required maxlength="10" inputmode="numeric" pattern="[0-9]{6,10}" oninput="soloNumeros(this)">
            </div>

            <div class="form-group button-stack">
                <button type="button" class="btn-primary" id="sendCodeButton" onclick="handleSendCode(false)">Enviar codigo al correo</button>
                <button type="button" class="btn-secondary" id="resendCodeButton" onclick="handleSendCode(true)" disabled>Reenviar codigo</button>
                <div class="countdown-box" id="codeCountdownBox">
                    <span class="countdown-status" id="codeCountdownStatus"></span>
                    Tu codigo estara vigente por <strong id="codeCountdownValue">03:00</strong>.
                    Cuando el contador llegue a cero podras pedir uno nuevo.
                </div>
            </div>

            <div class="form-group">
                <label for="recovery-code">Codigo de recuperacion</label>
                <input type="text" id="recovery-code" placeholder="Ingresa el codigo de 6 digitos" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" oninput="soloCodigo(this)" disabled required>
            </div>

            <div class="form-group">
                <label for="recovery-password">Nueva contrasena</label>
                <div class="password-input-group">
                    <input type="password" id="recovery-password" placeholder="Nueva contrasena" disabled required>
                    <button type="button" class="toggle-password" onclick="togglePassword('recovery-password', this)" aria-label="Mostrar contrasena">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                            <path d="M9.5 5.3A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-4 4.9"></path>
                            <path d="M6.6 6.7C4 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 3-.4"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="recovery-password-confirm">Confirmar contrasena</label>
                <div class="password-input-group">
                    <input type="password" id="recovery-password-confirm" placeholder="Confirma la contrasena" disabled required>
                    <button type="button" class="toggle-password" onclick="togglePassword('recovery-password-confirm', this)" aria-label="Mostrar contrasena">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                            <path d="M9.5 5.3A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-4 4.9"></path>
                            <path d="M6.6 6.7C4 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 3-.4"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="resetPasswordButton" disabled>Actualizar contrasena</button>
            <a href="/login" class="back-link">Volver al login</a>
        </form>
    </div>

    <script>
        const PASSWORD_CODE_DURATION_SECONDS = 3 * 60;
        let recoveryCountdownInterval = null;
        let recoveryCountdownDeadline = null;

        function soloNumeros(input) {
            input.value = (input.value || '').replace(/\D/g, '').slice(0, 10);
        }

        function soloCodigo(input) {
            input.value = (input.value || '').replace(/\D/g, '').slice(0, 6);
        }

        function setRecoveryStepEnabled(enabled) {
            document.getElementById('recovery-code').disabled = !enabled;
            document.getElementById('recovery-password').disabled = !enabled;
            document.getElementById('recovery-password-confirm').disabled = !enabled;
            document.getElementById('resetPasswordButton').disabled = !enabled;
            document.getElementById('sendCodeButton').disabled = enabled;
            if (!enabled) {
                document.getElementById('resendCodeButton').disabled = true;
            }
        }

        function formatCountdown(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        function stopRecoveryCountdown() {
            if (recoveryCountdownInterval) {
                clearInterval(recoveryCountdownInterval);
                recoveryCountdownInterval = null;
            }
            recoveryCountdownDeadline = null;
            document.getElementById('codeCountdownBox').style.display = 'none';
            document.getElementById('codeCountdownValue').textContent = '03:00';
            document.getElementById('codeCountdownStatus').style.background = '#22c55e';
            document.getElementById('codeCountdownStatus').style.boxShadow = '0 0 0 4px rgba(34, 197, 94, 0.15)';
        }

        function updateRecoveryCountdown() {
            if (!recoveryCountdownDeadline) {
                return;
            }

            const remainingSeconds = Math.max(0, Math.ceil((recoveryCountdownDeadline - Date.now()) / 1000));
            document.getElementById('codeCountdownValue').textContent = formatCountdown(remainingSeconds);

            const statusDot = document.getElementById('codeCountdownStatus');
            if (remainingSeconds <= 30) {
                statusDot.style.background = '#ef4444';
                statusDot.style.boxShadow = '0 0 0 4px rgba(239, 68, 68, 0.15)';
            } else if (remainingSeconds <= 60) {
                statusDot.style.background = '#f59e0b';
                statusDot.style.boxShadow = '0 0 0 4px rgba(245, 158, 11, 0.15)';
            } else {
                statusDot.style.background = '#22c55e';
                statusDot.style.boxShadow = '0 0 0 4px rgba(34, 197, 94, 0.15)';
            }

            if (remainingSeconds <= 0) {
                stopRecoveryCountdown();
                document.getElementById('sendCodeButton').disabled = false;
                document.getElementById('resendCodeButton').disabled = false;
                mostrarMensaje('info', 'El codigo vencio. Ya puedes solicitar uno nuevo.');
            }
        }

        function startRecoveryCountdown(durationSeconds = PASSWORD_CODE_DURATION_SECONDS) {
            stopRecoveryCountdown();
            recoveryCountdownDeadline = Date.now() + durationSeconds * 1000;
            document.getElementById('codeCountdownBox').style.display = 'block';
            document.getElementById('sendCodeButton').disabled = true;
            document.getElementById('resendCodeButton').disabled = true;
            updateRecoveryCountdown();
            recoveryCountdownInterval = setInterval(updateRecoveryCountdown, 1000);
        }

        function updateRequirement(elementId, isValid) {
            const element = document.getElementById(elementId);
            element.textContent = isValid ? '✓' : '✕';
            element.style.background = isValid ? '#28a745' : '#dc3545';
        }

        function getEyeIcon(isVisible) {
            if (!isVisible) {
                return `
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 3l18 18"></path>
                        <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                        <path d="M9.5 5.3A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-4 4.9"></path>
                        <path d="M6.6 6.7C4 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 3-.4"></path>
                    </svg>
                `;
            }

            return `
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            `;
        }

        function mostrarMensaje(tipo, mensaje, titulo = '') {
            if (window.Swal) {
                return window.Swal.fire({
                    title: titulo || (tipo === 'success' ? 'Listo' : tipo === 'error' ? 'Error' : 'Mensaje'),
                    text: mensaje,
                    icon: tipo,
                    confirmButtonText: 'Aceptar',
                    confirmButtonColor: '#355070',
                    customClass: {
                        popup: 'gespro-alert-popup',
                        title: 'gespro-alert-title',
                        htmlContainer: 'gespro-alert-text',
                        confirmButton: 'gespro-alert-button'
                    }
                });
            }
            return Promise.resolve();
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = getEyeIcon(true);
                button.setAttribute('aria-label', 'Ocultar contrasena');
            } else {
                input.type = 'password';
                button.innerHTML = getEyeIcon(false);
                button.setAttribute('aria-label', 'Mostrar contrasena');
            }
        }

        async function handleSendCode(isResend = false) {
            const correo = document.getElementById('recovery-correo').value.trim();
            const numeroDocumento = document.getElementById('recovery-documento').value.trim();

            if (!correo || !numeroDocumento) {
                await mostrarMensaje('warning', 'Primero completa el correo y el numero de documento.');
                return;
            }

            try {
                const response = await fetch('/api/auth/request-password-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, numeroDocumento })
                });

                const raw = await response.text();
                let data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (e) {
                    data = { message: raw };
                }

                if (!response.ok) {
                    throw new Error(data.detail || data.message || raw);
                }

                setRecoveryStepEnabled(true);
                startRecoveryCountdown();
                await mostrarMensaje(
                    'success',
                    isResend
                        ? 'Te reenviamos un nuevo codigo de recuperacion. Sera valido durante 3 minutos.'
                        : 'Te enviamos un codigo de recuperacion al correo registrado. Sera valido durante 3 minutos.'
                );
                document.getElementById('recovery-code').focus();
            } catch (error) {
                await mostrarMensaje('error', 'No se pudo enviar el codigo: ' + error.message);
            }
        }

        async function handleForgotPassword(event) {
            event.preventDefault();

            const correo = document.getElementById('recovery-correo').value;
            const numeroDocumento = document.getElementById('recovery-documento').value;
            const codigo = document.getElementById('recovery-code').value;
            const nuevaPassword = document.getElementById('recovery-password').value;
            const confirmarPassword = document.getElementById('recovery-password-confirm').value;

            if (document.getElementById('recovery-code').disabled) {
                await mostrarMensaje('warning', 'Primero debes solicitar el codigo de recuperacion.');
                return;
            }

            if (!codigo || codigo.length !== 6) {
                await mostrarMensaje('error', 'Ingresa el codigo de recuperacion de 6 digitos.');
                return;
            }

            if (nuevaPassword !== confirmarPassword) {
                await mostrarMensaje('error', 'Las contrasenas no coinciden');
                return;
            }

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, numeroDocumento, codigo, nuevaPassword })
                });

                const raw = await response.text();
                let data = {};
                try {
                    data = raw ? JSON.parse(raw) : {};
                } catch (e) {
                    data = { message: raw };
                }

                if (!response.ok) {
                    throw new Error(data.detail || data.message || raw);
                }

                await mostrarMensaje('success', 'Contrasena actualizada. Ya puedes iniciar sesion.');
                document.getElementById('forgotPasswordForm').reset();
                document.getElementById('recovery-correo').value = correo;
                setRecoveryStepEnabled(false);
                stopRecoveryCountdown();
            } catch (error) {
                await mostrarMensaje('error', 'Error al recuperar contrasena: ' + error.message);
            }
        }
    </script>
</body>
</html>
