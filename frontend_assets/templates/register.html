<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - SENA Mapeo</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('/img/2148430814.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: url('/img/logo_sena.png') center/contain no-repeat;
            z-index: 1000;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        .logo-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .title {
            text-align: center;
            color: #000;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .role-banner {
            margin-bottom: 22px;
            padding: 14px 18px;
            border-radius: 8px;
            background: #eef4ff;
            color: #355070;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #000;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0c0d0d 0%, #097b98 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .password-input-group {
            position: relative;
        }

        .password-input-group input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(102, 126, 234, 0.25);
            background: rgba(102, 126, 234, 0.08);
            cursor: pointer;
            color: #667eea;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .toggle-password:hover {
            background: rgba(102, 126, 234, 0.16);
            box-shadow: 0 6px 14px rgba(102, 126, 234, 0.18);
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .error-message,
        .success-message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
        }

        .requirement-box {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 13px;
        }

        .requirement-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .requirement-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border-radius: 50%;
            background: #ddd;
            color: white;
            text-align: center;
            line-height: 16px;
            font-size: 10px;
            font-weight: bold;
        }

        .document-input-group {
            position: relative;
        }

        .document-input-group input {
            padding-right: 45px;
        }

        .document-status {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            background: #dcdcdc;
            color: #ffffff;
        }

        .spinner {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #000;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .gespro-alert-popup {
            border-radius: 18px !important;
            padding: 24px !important;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18) !important;
        }
        .gespro-alert-title {
            font-size: 28px !important;
            font-weight: 700 !important;
            color: #355070 !important;
        }
        .gespro-alert-text {
            font-size: 17px !important;
            color: #4b5563 !important;
        }
        .gespro-alert-button {
            background: #355070 !important;
            border-radius: 10px !important;
            padding: 10px 22px !important;
            font-weight: 700 !important;
            box-shadow: none !important;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <img src="/img/logo3.png" alt="Logo 3" class="logo-top-right">
        <h1 class="title">Registrarse</h1>

        <div class="role-banner"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <input type="hidden" id="rolId" name="rolId" value="3">

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required oninput="formatearNombreApellido(this)">
            </div>

            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required oninput="formatearNombreApellido(this)">
            </div>

            <div class="form-group">
                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" name="correo" placeholder="correo@example.com" required>
            </div>

            <div class="form-group">
                <label for="tipoDocumento">Tipo de documento</label>
                <select id="tipoDocumento" name="tipoDocumento" required>
                    <option value="">Selecciona un tipo</option>
                    <option value="CC">Cedula de Ciudadania</option>
                    <option value="TI">Tarjeta de Identidad</option>
                    <option value="CE">Cedula de Extranjeria</option>
                    <option value="Pasaporte">Pasaporte</option>
                </select>
            </div>

            <div class="form-group">
                <label for="numeroDocumento">Numero de documento</label>
                <div class="document-input-group">
                    <input type="text" id="numeroDocumento" name="numeroDocumento" placeholder="1234567890" required maxlength="10" inputmode="numeric" pattern="[0-9]{6,10}" oninput="soloNumeros(this); validateDocumento()">
                    <span id="doc-status-icon" class="document-status">•</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <div class="password-input-group">
                    <input type="password" id="password" name="password" placeholder="********" required onkeyup="validatePassword()">
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Mostrar contrasena">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                            <path d="M9.5 5.3A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-4 4.9"></path>
                            <path d="M6.6 6.7C4 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 3-.4"></path>
                        </svg>
                    </button>
                </div>

                <div class="requirement-box">
                    <p style="margin-bottom: 10px; font-weight: 600; color: #000;">Requisitos de contrasena:</p>
                    <div class="requirement-row"><span id="req-length" class="requirement-icon">X</span><span>Al menos 8 caracteres</span></div>
                    <div class="requirement-row"><span id="req-upper" class="requirement-icon">X</span><span>Letra mayuscula</span></div>
                    <div class="requirement-row"><span id="req-lower" class="requirement-icon">X</span><span>Letra minuscula</span></div>
                    <div class="requirement-row"><span id="req-number" class="requirement-icon">X</span><span>Numero</span></div>
                    <div class="requirement-row"><span id="req-special" class="requirement-icon">X</span><span>Caracter especial</span></div>
                </div>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirmar contrasena</label>
                <div class="password-input-group">
                    <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="********" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('passwordConfirm', this)" aria-label="Mostrar contrasena">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                            <path d="M9.5 5.3A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-4 4.9"></path>
                            <path d="M6.6 6.7C4 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 3-.4"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-register">
                Registrarse
                <span class="spinner" id="spinner"></span>
            </button>

            <p class="login-link">
                Ya tienes cuenta? <a href="/login">Inicia sesion</a>
            </p>

        </form>
    </div>

    <script>
        function getEyeIcon(isVisible) {
            if (!isVisible) {
                return `
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 3l18 18"></path>
                        <path d="M10.6 10.7a3 3 0 0 0 4.2 4.2"></path>
                        <path d="M9.5 5.3A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-4 4.9"></path>
                        <path d="M6.6 6.7C4 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 3-.4"></path>
                    </svg>
                `;
            }

            return `
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            `;
        }

        function mostrarMensaje(tipo, mensaje, titulo = '') {
            if (window.Swal) {
                return window.Swal.fire({
                    title: titulo || (tipo === 'success' ? 'Listo' : tipo === 'error' ? 'Error' : 'Mensaje'),
                    text: mensaje,
                    icon: tipo,
                    confirmButtonText: 'Aceptar',
                    confirmButtonColor: '#355070',
                    customClass: {
                        popup: 'gespro-alert-popup',
                        title: 'gespro-alert-title',
                        htmlContainer: 'gespro-alert-text',
                        confirmButton: 'gespro-alert-button'
                    }
                });
            }
            return Promise.resolve();
        }

        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = getEyeIcon(true);
                button.setAttribute('aria-label', 'Ocultar contrasena');
            } else {
                input.type = 'password';
                button.innerHTML = getEyeIcon(false);
                button.setAttribute('aria-label', 'Mostrar contrasena');
            }
        }

        function capitalizeWords(value) {
            return (value || '').trim().toLowerCase().split(' ').filter(Boolean).map(word => word[0].toUpperCase() + word.slice(1)).join(' ');
        }

        function formatearNombreApellido(input) {
            const limpio = (input.value || '')
                .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñÜü\s]/g, '')
                .replace(/\s+/g, ' ')
                .replace(/^\s+/, '');
            input.value = capitalizeWords(limpio);
        }

        function soloNumeros(input) {
            input.value = (input.value || '').replace(/\D/g, '').slice(0, 10);
        }

        function updateRequirement(elementId, isValid) {
            const element = document.getElementById(elementId);
            element.textContent = isValid ? '✓' : '✕';
            element.style.background = isValid ? '#28a745' : '#dc3545';
        }

        function validateDocumento() {
            const input = document.getElementById('numeroDocumento');
            const value = (input.value || '').replace(/\D/g, '');
            const isValid = value.length >= 6 && value.length <= 10;

            const statusIcon = document.getElementById('doc-status-icon');
            statusIcon.textContent = isValid ? '✓' : '•';
            statusIcon.style.background = isValid ? '#28a745' : '#dcdcdc';
        }

        function validatePassword() {
            const password = document.getElementById('password').value;
            updateRequirement('req-length', password.length >= 8);
            updateRequirement('req-upper', /[A-Z]/.test(password));
            updateRequirement('req-lower', /[a-z]/.test(password));
            updateRequirement('req-number', /[0-9]/.test(password));
            updateRequirement('req-special', /[^A-Za-z0-9]/.test(password));
        }

        async function handleRegister(event) {
            event.preventDefault();

            const nombre = capitalizeWords(document.getElementById('nombre').value);
            const apellido = capitalizeWords(document.getElementById('apellido').value);
            const correo = document.getElementById('correo').value;
            const tipoDocumento = document.getElementById('tipoDocumento').value;
            const numeroDocumento = document.getElementById('numeroDocumento').value.replace(/\D/g, '');
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const spinner = document.getElementById('spinner');
            const btnRegister = document.querySelector('.btn-register');

            if (numeroDocumento.length < 6 || numeroDocumento.length > 10) {
                await mostrarMensaje('error', 'El numero de documento debe contener entre 6 y 10 digitos');
                return;
            }

            const strongPassword =
                password.length >= 8 &&
                /[A-Z]/.test(password) &&
                /[a-z]/.test(password) &&
                /[0-9]/.test(password) &&
                /[^A-Za-z0-9]/.test(password);

            if (!strongPassword) {
                await mostrarMensaje('error', 'La contrasena no cumple con todos los requisitos');
                return;
            }

            if (password !== passwordConfirm) {
                await mostrarMensaje('error', 'Las contrasenas no coinciden');
                return;
            }

            spinner.style.display = 'inline-block';
            btnRegister.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre,
                        apellido,
                        correo,
                        tipoDocumento,
                        numeroDocumento,
                        rolId: 3,
                        password
                    })
                });

                const raw = await response.text();
                if (!response.ok) {
                    throw new Error(raw);
                }

                await mostrarMensaje('success', 'Registro exitoso. Redirigiendo al inicio de sesion...');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
            } catch (error) {
                await mostrarMensaje('error', 'Error al registrarse: ' + error.message);
            } finally {
                spinner.style.display = 'none';
                btnRegister.disabled = false;
            }
        }
    </script>
</body>
</html>
